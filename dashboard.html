<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Wanci International Loge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
.menu-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    color:black;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:gold;
    font-weight:bold;
}

.logout{
    background:red;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#roomList .card,
#foodList .card{
    margin-top:10px;
    background:#f2f2f2;
}
</style>

</head>

<body>

<div style="text-align:right;padding:20px;">
<button class="logout" onclick="logout()">Logout</button>
</div>

<h1 style="text-align:center;">Hotel Dashboard</h1>

<div class="menu-grid">

<!-- Room System -->
<div class="card">
<h3>Room System</h3>
<p>Manage hotel rooms</p>
<button onclick="addRoom()">Add Room</button>
<div id="roomList"></div>
</div>

<!-- Restaurant System -->
<div class="card">
<h3>Restaurant System</h3>
<p>Food menu management</p>

<button onclick="addFood()">Add Food</button>
<div id="foodList"></div>
</div>

<!-- Finance Placeholder -->
<div class="card">
<h3>Finance</h3>
<p>Income and expenses</p>
</div>

</div>

<script src="js/auth.js"></script>
<script src="js/room.js"></script>
<script src="js/restaurant.js"></script>

<script>
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href="login.html";
}

window.onload = function(){
    if(localStorage.getItem("loggedIn") !== "true"){
        window.location.href="login.html";
    }

    showRooms();
    showFoods();
}
</script>

</body>
</html>
