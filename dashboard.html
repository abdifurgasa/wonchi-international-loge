<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Wanci International Lodge Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="sidebar" id="sidebar">

<h2>Wanci Lodge</h2>

<ul>
<li onclick="showPage('home')">🏠 Dashboard</li>
<li onclick="showPage('rooms')">🛏 Rooms</li>
<li onclick="showPage('booking')">📅 Booking</li>

</ul>

</div>

<div class="main">

<div class="topbar">
<button onclick="toggleMenu()">☰</button>

</div>

<div class="content">

<div class="page active" id="home">

<div class="card">
<h2>Dashboard Overview</h2>
<p>Hotel Management System</p>
</div>

<div class="card">
<h3>Total Rooms</h3>

</div>

</div>

<div class="page" id="rooms">
<h2>Room Management</h2>
</div>

<div class="page" id="booking">
<h2>Booking Panel</h2>
</div>

</div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
