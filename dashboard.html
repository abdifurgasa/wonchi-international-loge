<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wonchi International Lodge Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Wonchi Lodge</h2>

<ul>
<li data-page="home">🏠 Dashboard</li>
<li data-page="rooms">🛏 Rooms</li>
<li data-page="booking">📅 Booking</li>
<li data-page="restaurant">🍽 Food</li>
<li data-page="drinks">🍹 Drinks</li>
<li id="logoutBtn">🚪 Logout</li>
</ul>

</div>


<!-- MAIN AREA -->

<div class="main">

<!-- HEADER -->

<div class="topbar">

<div class="notification">

🔔 Notifications

<span id="notifyBadge">
0
</span>

</div>

</div>


<!-- CONTENT -->

<div class="content">


<!-- DASHBOARD PAGE -->

<div class="page active" id="home">

<h2>Dashboard</h2>

<div class="dashboard-cards">

<div class="card">
<h3>Total Rooms</h3>
<h1 id="totalRooms">0</h1>
</div>

</div>

<canvas id="revenueChart"></canvas>

</div>



<!-- ROOMS PAGE -->

<div class="page" id="rooms">

<h2>Room Management</h2>

<input id="roomNumber" placeholder="Room Number">

<select id="roomType">
<option>Single</option>
<option>Double</option>
<option>Deluxe</option>
<option>VIP</option>
</select>

<input id="roomPrice" placeholder="Price">

<button id="addRoomBtn">Add Room</button>

<div id="roomList"></div>

</div>



<!-- BOOKING PAGE -->

<div class="page" id="booking">

<h2>Booking</h2>

<input id="guestName" placeholder="Guest Name">

<select id="bookingRoom"></select>

<input type="date" id="checkIn">

<input type="date" id="checkOut">

<button id="createBookingBtn">Create Booking</button>

<div id="bookingList"></div>

</div>



<!-- NOTIFICATIONS -->

<div id="notificationList"></div>


</div>
</div>


<script type="module" src="js/dashboard.js"></script>

</body>

</html>
