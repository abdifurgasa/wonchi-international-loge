<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Wanci International Lodge</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Wanci Lodge</h2>
        <ul>
            <li onclick="navigate('rooms')">🏨 Rooms</li>
            <li onclick="navigate('restaurant')">🍽 Restaurant</li>
            <li onclick="navigate('customers')">👥 Customers</li>
            <li onclick="navigate('finance')">💰 Finance</li>
            <li onclick="navigate('staff')">👨‍💼 Staff</li>
            <li onclick="navigate('reports')">📊 Reports</li>
            <li onclick="logout()">🚪 Logout</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <div class="topbar">
            <h1>Dashboard Overview</h1>
            <div class="user-info">
                Welcome, Admin
            </div>
        </div>

        <div class="cards">

            <div class="card">
                <h3>Total Rooms</h3>
                <p>24</p>
            </div>

            <div class="card">
                <h3>Available Rooms</h3>
                <p>15</p>
            </div>

            <div class="card">
                <h3>Today Revenue</h3>
                <p>$1,250</p>
            </div>

            <div class="card">
                <h3>Total Customers</h3>
                <p>68</p>
            </div>

        </div>

    </div>

</div>
<script src="js/core/config.js"></script>
<script src="js/core/database.js"></script>
<script src="js/core/models.js"></script>
<script src="js/core/services.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
