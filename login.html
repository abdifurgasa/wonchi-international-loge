<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Login Card */
.login-box{
    width:350px;
    padding:40px;
    border-radius:20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    box-shadow:0 0 40px rgba(0,0,0,0.4);
    text-align:center;
    color:white;
}

/* Input Style */
.login-box input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:12px;
    font-size:15px;
    outline:none;
}

/* Button Style */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:gold;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.06);
}

#msg{
    margin-top:12px;
    color:red;
}

</style>
