<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Wanci International Loge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<style>
.menu-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    color:black;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.logout{
    background:red;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>

</head>

<body>

<div style="text-align:right;padding:20px;">
<button class="logout" onclick="logout()">Logout</button>
</div>

<h1 style="text-align:center;">Hotel Dashboard</h1>

<div class="menu-grid">

<div class="card">
<h3>Room Management</h3>
<p>Manage hotel rooms</p>
</div>

<div class="card">
<h3>Restaurant Orders</h3>
<p>Food & menu orders</p>
</div>

<div class="card">
<h3>Finance</h3>
<p>Income and expenses</p>
</div>

</div>

<script src="js/auth.js"></script>

<script>
function logout(){
    window.location.href = "login.html";
}
</script>

</body>
</html>
