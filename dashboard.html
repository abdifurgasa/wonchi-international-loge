<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Wanci International Loge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* Top Header */
.header{
    padding:25px;
    text-align:center;
}

/* Dashboard Grid */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    padding:40px;
}

/* Luxury Card */
.card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding:25px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

/* Buttons */
.btn{
    background:gold;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-top:12px;
}

.logout{
    background:red;
    color:white;
    border:none;
    padding:10px 22px;
    border-radius:8px;
    cursor:pointer;
}

#roomList .card,
#foodList .card{
    margin-top:12px;
    background:rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div style="text-align:right;padding:20px;">
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="header">
<h1>⭐ Wanci International Loge</h1>
<p>Luxury Hotel Management Dashboard</p>
</div>

<div class="grid">

<div class="card">
<h3>🛏 Room System</h3>
<p>Manage hotel rooms</p>
<button class="btn" onclick="addRoom()">Add Room</button>
<div id="roomList"></div>
</div>

<div class="card">
<h3>🍽 Restaurant System</h3>
<p>Food menu management</p>
<button class="btn" onclick="addFood()">Add Food</button>
<div id="foodList"></div>
</div>

<div class="card">
<h3>💰 Finance</h3>
<p>Income & expense panel</p>
<p>Coming soon...</p>
</div>

</div>

<script src="js/auth.js"></script>
<script src="js/room.js"></script>
<script src="js/restaurant.js"></script>

<script>

function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href="login.html";
}

window.onload=function(){
    if(localStorage.getItem("loggedIn")!=="true"){
        window.location.href="login.html";
    }

    showRooms();
    showFoods();
}

</script>

</body>
</html>
