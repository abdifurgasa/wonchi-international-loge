<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wanci International Loge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* Glass Login Card */
.login-box {
    width: 360px;
    padding: 45px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    text-align: center;
    color: white;
    transition: 0.4s;
}

.login-box:hover {
    box-shadow: 0 0 60px rgba(255, 215, 0, 0.6);
}

/* Title */
.login-box h2 {
    margin-bottom: 25px;
    font-weight: 700;
    letter-spacing: 1px;
    color: gold;
}

/* Input Fields */
.login-box input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    background: rgba(255, 255, 255, 0.2);
    color: white;
}

.login-box input::placeholder {
    color: #f1f1f1;
}

/* Login Button */
.btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: gold;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: #ffcc00;
}

#msg {
    margin-top: 12px;
    color: #ff6666;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>⭐ Wanci International Loge</h2>
    <p>Hotel Management System</p>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button class="btn" onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<script src="js/auth.js"></script>
</body>
</html>
