<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooms - Wanci Lodge</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="main-content">

    <h1>Room Management</h1>

    <div class="card">
        <h3>Add New Room</h3>
        <input type="text" id="roomNumber" placeholder="Room Number">
        <input type="text" id="roomType" placeholder="Room Type">
        <input type="number" id="roomPrice" placeholder="Price">
        <button onclick="addRoom()">Add Room</button>
    </div>

    <div class="card">
        <h3>Room List</h3>
        <table width="100%" id="roomTable">
            <thead>
                <tr>
                    <th>Number</th>
                    <th>Type</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <button onclick="goBack()">⬅ Back to Dashboard</button>

</div>

<script src="../js/core/config.js"></script>
<script src="../js/core/database.js"></script>
<script src="../js/core/models.js"></script>
<script src="../js/core/services.js"></script>
<script src="../js/modules/rooms.js"></script>

</body>
</html>
