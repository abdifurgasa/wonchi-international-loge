<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="title">Wonchi International Loge</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("images/login-bg.jpg") center/cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:35px;
    width:320px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,.2);
}

h2{
    text-align:center;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#0b6efd;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.eye{
    float:right;
    margin-top:-38px;
    margin-right:10px;
    cursor:pointer;
}

label{
    font-weight:bold;
}

</style>
</head>

<body>

<div class="login-box">

<h2 id="loginTitle">Wonchi International Loge</h2>

<select onchange="changeLanguage(this.value)">
<option value="english">English</option>
<option value="amharic">Amharic</option>
<option value="afan-oromo">Afaan Oromo</option>
</select>

<br>

<label id="emailLabel">Email</label>
<input type="email" id="email">

<label id="passwordLabel">Password</label>
<input type="password" id="password">
<span class="eye" onclick="togglePassword()">👁️</span>

<button id="loginBtn" onclick="login()">Login</button>

<p id="error" style="color:red;text-align:center"></p>

</div>

<!-- Scripts -->
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/language.js"></script>

<script>
function togglePassword(){
    let p=document.getElementById("password");
    p.type = p.type==="password" ? "text" : "password";
}
</script>

</body>
</html>
