<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Wonchi International Loge Login</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("images/login-bg.jpg") center/cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:35px;
    width:320px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,.2);
    animation:fadeIn 1s;
}

h2{
    text-align:center;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

input:focus{
    border-color:#0b6efd;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#0b6efd;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#084bb5;
}

.eye{
    float:right;
    margin-top:-38px;
    margin-right:10px;
    cursor:pointer;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>

<body>

<div class="login-box">

<h2>🏨 Wonchi International Loge</h2>

<select>
<option>English</option>
<option>Amharic</option>
<option>Afaan Oromo</option>
</select>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">
<span class="eye" onclick="togglePassword()">👁️</span>

<button id="loginBtn">Login</button>

<p id="error" style="color:red;text-align:center"></p>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>

<script>
function togglePassword(){
let p=document.getElementById("password");
p.type = p.type==="password" ? "text" : "password";
}
</script>

</body>
    </html>
