<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking System - Wanci Lodge</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="main-content">

<h1>📑 Smart Booking System</h1>

<!-- Booking Form -->
<div class="card">

<h3>Create Booking</h3>

<input type="text" id="customerName" placeholder="Customer Name">
<input type="text" id="customerPhone" placeholder="Customer Phone">

<select id="roomSelect"></select>

<button onclick="createBooking()">Book Room</button>

</div>

<!-- Booking Table -->
<div class="card">

<h3>Booking List</h3>

<table width="100%" border="1" id="bookingTable">
<thead>
<tr>
<th>Customer</th>
<th>Phone</th>
<th>Room</th>
<th>Price</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<button onclick="goBack()">⬅ Back Dashboard</button>

</div>

<!-- Core Scripts -->
<script src="../js/core/config.js"></script>
<script src="../js/core/database.js"></script>
<script src="../js/core/models.js"></script>
<script src="../js/core/services.js"></script>

<!-- Booking Module -->
<script src="../js/modules/bookings.js"></script>

</body>
</html>
