<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking List</title>

<link rel="stylesheet" href="css/style.css">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* Firebase Config */
const firebaseConfig = {
 apiKey: "PASTE_API_KEY",
 authDomain: "wanci-international-loge.firebaseapp.com",
 projectId: "wanci-international-loge",
 storageBucket: "wanci-international-loge.firebasestorage.app",
 messagingSenderId: "346207231234",
 appId: "1:346207231234:web:09ae7390e6544721dfb61b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.onload = async function(){

const container = document.getElementById("bookingList");

const querySnapshot = await getDocs(collection(db,"bookings"));

querySnapshot.forEach((doc)=>{

let data = doc.data();

container.innerHTML += `
<div class="card">
🏷 Customer: ${data.customer}<br>
🚪 Room: ${data.room}<br>
💰 Price: ${data.price}<br>
📅 Date: ${data.date}
</div>
`;

});

}

</script>

</head>

<body>

<div class="dashboard">

<h2>📋 Booking List</h2>

<div id="bookingList" class="cards"></div>

</div>

</body>
</html>
