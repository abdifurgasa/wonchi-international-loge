<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wanci International Lodge</title>

<link rel="stylesheet" href="css/style.css">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

/* 🔥 Firebase Config — Replace ONLY API KEY if needed */
const firebaseConfig = {
 apiKey: "PASTE_YOUR_API_KEY_HERE",
 authDomain: "wanci-international-loge.firebaseapp.com",
 projectId: "wanci-international-loge",
 storageBucket: "wanci-international-loge.firebasestorage.app",
 messagingSenderId: "346207231234",
 appId: "1:346207231234:web:09ae7390e6544721dfb61b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ⭐ Login Function */
window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const role = document.getElementById("role").value;

if(email === "" || password === "" || role === ""){
 alert("⚠ Please fill all fields");
 return;
}

signInWithEmailAndPassword(auth, email, password)
.then(()=>{

localStorage.setItem("userRole", role);

window.location.href = "dashboard.html";

})
.catch(()=>{
alert("❌ Login Failed");
});

}

</script>

</head>

<body>

<div class="login-box">

<h2>🏨 Wanci International Lodge</h2>

<select id="role">
<option value="">Select Role</option>
<option value="Admin">Admin</option>
<option value="Manager">Manager</option>
<option value="Reception">Reception</option>
<option value="Restaurant">Restaurant</option>
<option value="Kitchen">Kitchen</option>
<option value="Barman">Barman</option>
<option value="Finance">Finance</option>
</select>

<input id="email" placeholder="Enter Email">

<input id="password" type="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>

</body>
</html>
