<div class="page" id="rooms">

<div class="card">
<h2>Add New Room</h2>

<input type="text" id="roomNumber" placeholder="Room Number">
<select id="roomType" onchange="setAutoPrice()">
<option value="">Select Type</option>
<option value="Single">Single</option>
<option value="Double">Double</option>
<option value="Deluxe">Deluxe</option>
<option value="Smart">Smart</option>
<option value="VIP">VIP</option>
</select>

<input type="number" id="roomPrice" placeholder="Price">
<input type="file" id="roomPhoto">

<button onclick="addRoom()">Add Room</button>

</div>

<div class="card">
<h2>Room List</h2>
<div id="roomList" class="room-grid"></div>
</div>

</div>
