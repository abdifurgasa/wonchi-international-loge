<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant Orders</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="main-content">

<h1>🍽 Restaurant Order System</h1>

<div class="card">

<h3>Create Food Order</h3>

<input type="text" id="foodName" placeholder="Food Name">
<input type="number" id="foodPrice" placeholder="Price">

<button onclick="addFoodOrder()">Add Order</button>

</div>

<div class="card">

<h3>Order List</h3>

<table width="100%" border="1" id="foodTable">

<thead>
<tr>
<th>Food</th>
<th>Price</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<button onclick="goBack()">⬅ Dashboard</button>

</div>

<script src="../js/core/database.js"></script>
<script src="../js/business/finance.js"></script>
<script src="../js/modules/restaurant.js"></script>

</body>
</html>
