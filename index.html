<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wanci International Lodge - Login</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.login-box{
    background:white;
    padding:30px;
    width:320px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
.login-box h2{
    text-align:center;
}
input{
    width:100%;
    padding:10px;
    margin-top:10px;
}
button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="login-box">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
