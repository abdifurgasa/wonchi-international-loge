<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanci International Lodge Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h2>Wanci Lodge</h2>

<ul>
<li onclick="showPage('home')">🏠 Dashboard</li>
<li onclick="showPage('rooms')">🛏 Rooms</li>
<li onclick="showPage('booking')">📅 Booking</li>
<li onclick="logout()">🚪 Logout</li>
</ul>
</div>

<!-- MAIN CONTENT -->
<div class="main">

<div class="topbar">
<button onclick="toggleMenu()">☰</button>
<h3 id="welcomeText">Dashboard</h3>
</div>

<div class="content">

<!-- ================= HOME PAGE ================= -->
<div class="page active" id="home">

<div class="card">
<h2>Dashboard Overview</h2>
<p>Hotel Management System</p>
</div>

<div class="card">
<h3>Total Rooms</h3>
<h1 id="totalRooms">0</h1>
</div>

</div>

<!-- ================= ROOMS PAGE ================= -->
<div class="page" id="rooms">

<div class="card">
<h2>Add New Room</h2>

<input type="text" id="roomNumber" placeholder="Room Number">

<select id="roomType" onchange="setAutoPrice()">
<option value="">Select Type</option>
<option value="Single">Single</option>
<option value="Double">Double</option>
<option value="Deluxe">Deluxe</option>
<option value="Smart">Smart</option>
<option value="VIP">VIP</option>
</select>

<input type="number" id="roomPrice" placeholder="Price">
<input type="file" id="roomPhoto">

<button onclick="addRoom()">Add Room</button>

</div>

<div class="card">
<h2>Room List</h2>
<div id="roomList" class="room-grid"></div>
</div>

</div>

<!-- ================= BOOKING PAGE ================= -->
<div class="page" id="booking">

<div class="card">

<h2>Room Booking</h2>

<input type="text" id="guestName" placeholder="Guest Name">

<select id="bookingRoom"></select>

<input type="date" id="checkIn">
<input type="date" id="checkOut">

<button onclick="createBooking()">Create Booking</button>

</div>

<div class="card">
<h2>Booking List</h2>
<div id="bookingList"></div>
</div>

</div>
</div>
</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
