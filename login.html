<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wanci International Loge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Glass Login Card */
.login-box{
    width:340px;
    padding:45px;
    border-radius:25px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    box-shadow:0 0 35px rgba(0,0,0,0.4);
    text-align:center;
    color:white;
}

.login-box h2{
    margin-bottom:25px;
}

.login-box input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:10px;
    font-size:15px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:gold;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

#msg{
    margin-top:12px;
    color:red;
}

</style>

</head>

<body>

<div class="login-box">

<h2>⭐ Wanci International Loge</h2>
<p>Hotel Management System</p>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script src="js/auth.js"></script>

</body>
</html>
